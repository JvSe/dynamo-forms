name: Publish Dynamo Forms packages to npm

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      TAILWIND_DISABLE_OXIDE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Bump version in all packages
        id: bump
        run: |
          cd packages/core && pnpm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          cd ../..
          for pkg in builder react react-native; do
            (cd packages/$pkg && pnpm version $NEW_VERSION --no-git-tag-version)
          done
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumped to version $NEW_VERSION"

      - name: Ensure Tailwind Oxide binary for Linux
        run: pnpm add -w -D @tailwindcss/oxide-linux-x64-gnu@4.2.1

      - name: Build all packages
        run: pnpm run build

      - name: Publish core
        working-directory: ./packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --no-git-checks

      - name: Publish react
        working-directory: ./packages/react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --no-git-checks

      - name: Publish react-native
        working-directory: ./packages/react-native
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --no-git-checks

      - name: Publish builder
        working-directory: ./packages/builder
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --access public --no-git-checks

      - name: Commit and push version bump
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/core/package.json packages/builder/package.json packages/react/package.json packages/react-native/package.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push origin main
